server.port=8080
spring.application.name=api-gateway

# Routes - Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**, /admin/**, /user/**

# Routes - Event Service
spring.cloud.gateway.routes[1].id=event-service
spring.cloud.gateway.routes[1].uri=lb://event-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/events/**

# Routes - Registration Service
spring.cloud.gateway.routes[2].id=registration-service
spring.cloud.gateway.routes[2].uri=lb://registration-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/registration/**

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT (must match auth-service secret)
jwt.secret=${JWT_SECRET:9a4f4e35455ad3b246a4d538e78f99e82104323e4213a4f6789a44c1d2e3f4a5}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.cloud.loadbalancer=DEBUG
